<svg width="560" height="420" viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" font-style="italic">
  <!-- paper -->
  <rect x="0" y="0" width="560" height="420" fill="#F0EEE6"/>

  <g stroke="#141413" stroke-width="2.5" fill="none" stroke-linejoin="miter">
    <!-- the mux body -->
    <path d="M300,120 L380,160 L380,260 L300,300 Z"/>

    <!-- data inputs: the planners -->
    <line x1="130" y1="160" x2="300" y2="160"/>
    <line x1="130" y1="210" x2="300" y2="210"/>
    <line x1="130" y1="260" x2="300" y2="260"/>

    <!-- select: you -->
    <line x1="340" y1="64" x2="340" y2="140"/>

    <!-- clock: the loop -->
    <line x1="340" y1="356" x2="340" y2="280"/>

    <!-- output -->
    <line x1="380" y1="210" x2="470" y2="210"/>

  </g>

  <!-- clock glyph (square wave) — the loop's tick -->
  <path d="M310,374 h12 v-12 h12 v12 h12 v-12 h12" fill="none" stroke="#d97757" stroke-width="2.5"/>

  <!-- vertical wordmark inside the body -->
  <text x="340" y="160" text-anchor="middle" fill="#141413" font-size="12" font-style="italic" font-family="Georgia, serif">E<tspan x="340" dy="15.5">X</tspan><tspan x="340" dy="15.5">E</tspan><tspan x="340" dy="15.5">C</tspan><tspan x="340" dy="15.5">U</tspan><tspan x="340" dy="15.5">T</tspan><tspan x="340" dy="15.5">O</tspan><tspan x="340" dy="15.5">R</tspan></text>

  <!-- labels -->
  <g fill="#141413" font-size="19">
    <text x="120" y="166" text-anchor="end">planner<tspan font-size="13" dy="4">0</tspan></text>
    <text x="120" y="216" text-anchor="end">planner<tspan font-size="13" dy="4">1</tspan></text>
    <text x="120" y="266" text-anchor="end">planner<tspan font-size="13" dy="4">2</tspan></text>
    <text x="340" y="48" text-anchor="middle">you</text>
    <text x="480" y="216">commit</text>
    <text x="392" y="378">loop</text>
  </g>
</svg>
