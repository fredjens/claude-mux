<!doctype html><html lang=en translate=no><meta charset=utf-8><meta name="google" content="notranslate"><title>mux</title>
<style>
 :root{--accent:__ACCENT__;--ok:__OK__;--sub:__SUB__;--danger:__DANGER__}
</style>
<link rel=stylesheet href="/web/theme.css">
<link rel=stylesheet href="/web/app.css">
<header><canvas id=gol width=10 height=10></canvas><b>MULTIPLEXER</b><span id=provider>__PROVIDER__</span><span id=repo></span><span class=sp></span><span id=branch class=branch></span>
 <button id=autobtn onclick="toggleAuto()" title="Auto mode: the executor runs DRAFT tasks in place and finished tasks are auto-approved — no status is rewritten, so toggling off restores every button">Auto mode: …</button>
 <button class=primary onclick="channel()">channel +</button>
 <button id=endbtn class=end onclick="endSession()" title="End the session: push this branch to its upstream, clear the committed tasks, return to the base branch, and stop the loop + this UI. Stopping the CLI instead (Ctrl-C / mux stop) ends WITHOUT pushing and can be resumed.">End &amp; push</button></header>
<main>
 <section><h2 class=phead>Queue</h2><div id=tasks></div></section>
 <section><h2 class=phead>Output</h2><div id=working></div><pre id=log></pre></section>
</main>
<div id=backdrop onclick="closePlan()"></div>
<div id=drawer><div class=dhead><button class=dclose onclick="closePlan()" title="close">×</button></div><iframe id=planframe></iframe></div>
<script src="/web/vendor/marked.min.js"></script>
<script src="/web/app.js"></script>
